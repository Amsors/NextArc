# NextArc 推送偏好配置文件
# 复制此文件为 preferences.yaml 并填写实际值后使用
#
# 用途：配置推送偏好，用于过滤不想接收通知的活动
# 目前支持：按时间筛选（配置自己没空的时间段）

version: "1.0"

time_filter:
  # 是否启用时间筛选
  # true:  启用，会过滤与用户没空时间冲突的活动
  # false: 禁用，推送所有新活动
  enabled: false
  
  # 时间重叠判断模式
  # - partial:   有重叠即过滤（只要活动与您的没空时间有交集，就过滤该活动）
  # - full:      完全包含才过滤（仅当活动时间完全落在您的没空时间段内，才过滤该活动）
  # - threshold: 按比例阈值过滤（仅当冲突时间占活动总时长的比例 >= 阈值时，才过滤该活动）
  # 
  # 举例说明：
  # 假设您配置周一 14:00-16:00 没空，现在有一个活动 15:00-17:00：
  # - partial 模式：会过滤（15:00-16:00 有重叠）
  # - full 模式：不过滤（活动 17:00 结束，活动并不完全落在您的没空时间段内）
  # - threshold 模式：取决于阈值设置（冲突1小时，假设活动总时长2小时，比例=0.5）
  # 总结：
  # - partial 模式最严格，会过滤所有有时间冲突的活动
  # - full 模式最宽松，只过滤那些您完全无法参加的活动
  # - threshold 模式居中，根据您设定的阈值灵活控制过滤严格程度
  overlap_mode: "partial"
  
  # 重叠比例阈值（仅当 overlap_mode 为 "threshold" 时有效）
  # 范围：0.0 ~ 1.0，表示冲突时间占活动总时长的比例
  # 当实际重叠比例 >= 此阈值时，过滤该活动
  # 
  # 举例说明：
  # 假设您配置周一 10:00-11:00 和 14:00-14:30 没空，有一个活动 10:30-15:30（共5小时）：
  # - 冲突时间：10:30-11:00（30分钟）+ 14:00-14:30（30分钟）= 1小时
  # - 重叠比例：1/5 = 0.2（20%）
  # - 若 threshold = 0.3：不过滤（0.2 < 0.3）
  # - 若 threshold = 0.19：过滤（0.2 >= 0.19）
  overlap_threshold: 0.3
  
  # 每周时间偏好配置
  # 按周一到周日分别配置没空的时间段
  # 格式：HH:MM（24小时制）
  weekly_preferences:
    # 周一没空的时间段
    monday:
      # 示例：周一 14:00-16:00 和 19:00-21:00 没空
      - start: "14:00"
        end: "16:00"
      - start: "19:00"
        end: "21:00"
    
    # 周二没空的时间段
    tuesday:
      # 示例：周二全天有课
      - start: "08:00"
        end: "22:00"
    
    # 周三没空的时间段
    wednesday:
      # 示例：周三全天没课，可以参加活动
      [ ]
    
    # 周四没空的时间段
    thursday:
      # 示例：周四全天没课，可以参加活动
      [ ]
    
    # 周五没空的时间段
    friday:
      # 示例：周五下午没空
      - start: "14:00"
        end: "18:00"
    
    # 周六没空的时间段
    saturday:
      # 示例：周六全天没课，可以参加活动
      [ ]
    
    # 周日没空的时间段
    sunday:
      # 示例：周日晚上准备下周活动，不参加二课
      - start: "19:00"
        end: "22:00"

# NextArc 推送偏好配置文件
# 复制此文件为 preferences.yaml 并填写实际值后使用
#
# 用途：配置推送偏好，用于过滤不想接收通知的活动
# 目前支持：按时间筛选（配置自己没空的时间段）

version: "1.0"

time_filter:
  # 是否启用时间筛选
  # true:  启用，会过滤与用户没空时间冲突的活动
  # false: 禁用，推送所有新活动
  enabled: false
  
  # 时间重叠判断模式
  # - partial: 有重叠即过滤（只要活动与您的没空时间有交集，就过滤该活动）
  # - full:    完全包含才过滤（仅当活动时间完全落在您的没空时间段内，才过滤该活动）
  # 
  # 举例说明：
  # 假设您配置周一 14:00-16:00 没空，现在有一个活动 15:00-17:00：
  # - partial 模式：会过滤（15:00-16:00 有重叠）
  # - full 模式：不过滤（活动 17:00 结束，超出了您的没空时间）
  overlap_mode: "partial"
  
  # 每周时间偏好配置
  # 按周一到周日分别配置没空的时间段
  # 格式：HH:MM（24小时制）
  weekly_preferences:
    # 周一没空的时间段
    monday:
      # 示例：周一 14:00-16:00 和 19:00-21:00 没空
      # - start: "14:00"
      #   end: "16:00"
      # - start: "19:00"
      #   end: "21:00"
    
    # 周二没空的时间段
    tuesday:
      # 示例：周二全天有课
      # - start: "08:00"
      #   end: "22:00"
    
    # 周三没空的时间段
    wednesday: []
    
    # 周四没空的时间段
    thursday: []
    
    # 周五没空的时间段
    friday:
      # 示例：周五下午没空
      # - start: "14:00"
      #   end: "18:00"
    
    # 周六没空的时间段
    saturday: []
    
    # 周日没空的时间段
    sunday:
      # 示例：周日晚上准备下周
      # - start: "19:00"
      #   end: "22:00"

# ==================== 配置示例 ====================
# 
# 【示例 1】使用 partial 模式（有重叠即过滤）- 推荐用于固定课程时间
# 适合场景：上课时间固定，任何与课程时间冲突的活动都不参加
#
# time_filter:
#   enabled: true
#   overlap_mode: "partial"
#   weekly_preferences:
#     monday:
#       - start: "08:00"
#         end: "12:00"
#       - start: "14:00"
#         end: "17:30"
#     tuesday:
#       - start: "08:00"
#         end: "12:00"
#       - start: "14:00"
#         end: "17:30"
#     wednesday:
#       - start: "08:00"
#         end: "12:00"
#       - start: "14:00"
#         end: "17:30"
#     thursday:
#       - start: "08:00"
#         end: "12:00"
#       - start: "14:00"
#         end: "17:30"
#     friday:
#       - start: "08:00"
#         end: "12:00"
#       - start: "14:00"
#         end: "17:30"
#     saturday: []
#     sunday: []
#
# 【示例 2】使用 full 模式（完全包含才过滤）- 推荐用于整块时间安排
# 适合场景：只有特定的大块时间完全没空，其他时间灵活安排
#
# time_filter:
#   enabled: true
#   overlap_mode: "full"
#   weekly_preferences:
#     monday:
#       # 只有晚上 19:00-23:00 完全没空（比如固定健身时间）
#       - start: "19:00"
#         end: "23:00"
#     saturday:
#       # 周六全天外出
#       - start: "08:00"
#         end: "22:00"
#     sunday:
#       # 周日晚上有固定安排
#       - start: "19:00"
#         end: "23:00"
#
# 【示例 3】两种模式的区别演示
# 假设您配置：周一 14:00-16:00 没空
# 现在有三个新活动：
#   活动A：13:00-15:00（与您的没空时间部分重叠 1 小时）
#   活动B：15:00-17:00（与您的没空时间部分重叠 1 小时）
#   活动C：14:30-15:30（完全被您的没空时间包含）
# 
# 使用 partial 模式时：
#   - 活动A：被过滤（14:00-15:00 重叠）
#   - 活动B：被过滤（15:00-16:00 重叠）
#   - 活动C：被过滤（完全包含且有重叠）
# 
# 使用 full 模式时：
#   - 活动A：不过滤（活动开始时间 13:00 早于您的没空开始时间）
#   - 活动B：不过滤（活动结束时间 17:00 晚于您的没空结束时间）
#   - 活动C：被过滤（14:30-15:30 完全被 14:00-16:00 包含）
#
# 总结：
# - partial 模式更严格，会过滤更多活动，确保不会与您的安排冲突
# - full 模式更宽松，只过滤那些您完全无法参加的活动

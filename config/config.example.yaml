# NextArc 配置文件模板
# 复制此文件并填写实际值后使用

ustc:
  # 认证模式: "file" 从本文件读取，"env" 从环境变量读取，默认从file读取
  auth_mode: "file"
  
  # auth_mode=file 时使用以下配置
  username: "PB12345678"           # USTC学号，如 "SA22000001"
  password: "12345678"           # 统一身份认证密码
  
  # auth_mode=env 时从以下环境变量名读取
  env_username: "USTC_USERNAME"
  env_password: "USTC_PASSWORD"

filter:
  # 是否在显示自己已经报名的活动列表时，忽略已报名但活动已结束的活动，默认开启
  ignore_participated_but_ended_activity: true

behavior:
  # 是否在程序启动时扫描所有活动，不建议开启，默认关闭
  scan_on_start: false

monitor:
  # 定时扫描间隔（分钟），默认15分钟
  interval_minutes: 15
  # 发现新活动时是否发送飞书通知，默认开启
  notify_new_activities: true
  # 是否使用 AI 筛选新活动（需要配置 ai 部分），默认关闭
  use_ai_filter: false

version_check:
  # 是否启用新版本检查功能，默认关闭
  # 启用后，会在指定时间自动检查本地 git 仓库与远程仓库的版本差异
  # 如果有新版本，会通过飞书推送更新通知
  enabled: false
  
  # 检查时间设置（使用 24 小时制）
  # day_of_week: 0=周一, 1=周二, ..., 6=周日
  day_of_week: 6
  hour: 18
  minute: 0
  
  # Git 仓库设置
  remote_name: "origin"     # 远程仓库名称
  branch_name: "main"       # 要跟踪的分支名称
  auto_fetch: true          # 检查前是否自动执行 git fetch

# AI 筛选配置（使用 OpenAI API 格式）
# 重要：如果启用 AI 功能（enabled: true），以下所有带 [必填] 标记的配置项都必须填写，
# 否则程序启动时会报错。如果不使用 AI 功能，请保持 enabled: false
ai:
  # 是否启用 AI 筛选，默认关闭
  enabled: false
  
  # API 密钥 [必填]（如果 enabled: true）
  # 例如：sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  api_key: ""
  
  # API 基础 URL [可选]
  # 用于第三方兼容服务如 DeepSeek、Moonshot 等
  # 例如：https://api.deepseek.com/v1
  # 留空则使用 OpenAI 官方 API
  base_url: ""
  
  # 模型名称 [必填]（如果 enabled: true）
  # 例如：gpt-3.5-turbo, gpt-4, deepseek-v3
  # 必须与你的API提供方提供的模型名称一致
  model: ""
  
  # 用户偏好描述 [必填]（如果 enabled: true）
  # 用于指导 AI 筛选，建议详细描述你的专业、兴趣、想参加的活动类型等
  # 这将直接影响 AI 的筛选效果

  # 用户偏好描述 [必填]，以下是示例，请你根据你的实际情况填写！
  user_info: |
    用户对以下类型的活动感兴趣：
    - 与计算机科学专业相关的活动，如编程竞赛、黑客松，人工智能、软件开发相关活动
    - 学术讲座、会议、报告、分享
    - 经验分享类活动
    - 跑步，健身打卡等参与门槛低的体育活动
    - 打卡类活动，如运动打卡、学习打卡、读书打卡等
    - 一切模块为“劳”的活动，包括但不限于志愿者/劳务/场务等
    - 一切模块为“德”的活动，包括但不限于思政教育等
    用户对以下类型的活动不感兴趣：
    - 专业的舞蹈、音乐类活动(如嘻哈舞培训、管弦乐团训练、音乐剧排练)，但参与音乐会/演出作为观众不算在内
    - 篮球、排球、乒乓球等专门体育赛事或训练，但观赛或充当志愿者不算在内
  

  # 系统提示词文件路径 [必填]（如果 enabled: true），默认情况下已经配置好，无需人为创建或修改
  # 相对于项目根目录或绝对路径
  # 该文件必须存在且不能为空，否则启动时报错
  system_prompt_file: "config/prompts/system_prompt.txt"
  
  # 用户提示词模板文件路径 [必填]（如果 enabled: true），默认情况下已经配置好，无需人为创建或修改
  # 相对于项目根目录或绝对路径
  # 该文件必须存在且不能为空，否则启动时报错
  # 可用变量：{user_info}, {activity_info}
  user_prompt_template_file: "config/prompts/user_prompt_template.txt"
  
  # 采样温度 [必填]（如果 enabled: true）
  # 范围：0.0-2.0，越低结果越确定，越高结果越多样
  # 建议值：0.3（较为确定）到 0.7（较为灵活）
  temperature:

  # 额外的请求体参数 [可选]
  # 用于配置模型的额外行为，如禁用思考功能或指定响应格式为 JSON 对象
  # 请根据你的API提供方的文档填写！
  #  extra_body:
  #    thinking:
  #      type: "disabled"
  #    response_format:
  #      type: "json_object"

  # 请求超时时间（秒）[可选]
  # 默认 30 秒，范围：5-300
  timeout: 30
  
  # 速率限制配置 [可选]
  # 用于控制 API 请求速率，防止触发限流
  rate_limit:
    # 每分钟最大请求数（0表示不限制），默认60次，范围：0以上
    requests_per_minute: 60
    
    # 最大并发请求数，默认3个，范围：1-100
    max_concurrency: 3
    
    # 达到速率限制时是否排队等待（true推荐），默认开启
    # 如果设为 false，超过限制时会立即返回失败
    enable_queue: true
    
    # 队列最大等待时间（秒），默认300秒，范围：0以上
    # 超过此时间仍未获取到令牌则放弃
    queue_timeout: 300
  
  # 重试配置 [可选]
  # 用于配置请求失败时的重试策略
  retry:
    # 最大重试次数
    # 429限流、5xx错误、网络错误时会自动重试
    # 最大重试次数，默认3次，范围：0-20
    max_retries: 3
    
    # 基础重试延迟（秒），默认2秒，范围：0以上
    # 第一次重试等待的时间
    base_delay: 2.0

    # 最大重试延迟（秒），默认60秒，范围：0以上
    max_delay: 60.0
    
    # 退避倍数（指数退避），默认2.0，范围：1.0以上
    # 延迟计算公式: delay = base_delay * (backoff_factor ^ attempt) * jitter
    # 例如: 2s, 4s, 8s...（加上随机抖动）
    backoff_factor: 2.0
    
    # 触发重试的HTTP状态码，默认为以下五个状态码
    retry_on_status: [ 429, 500, 502, 503, 504 ]
    
    # 网络错误（连接超时、断开等）是否重试，默认开启
    # 如果设为 false，网络错误时会立即返回失败
    retry_on_network_error: true

feishu:
  # 飞书应用凭证（在飞书开放平台获取）
  app_id: "cli_xxxxxxxxxxxxxxxx"             # 如 "cli_xxxxxxxxxxxxxxxx"
  app_secret: "qwertyuiop1234567890"         # 应用密钥
  # 私聊会话ID（可选，格式如 oc_xxxxxxxxxxxxxxxx）
  # 配置后机器人启动即可发送消息，无需等待用户先发消息
  # 获取方式：首次运行时与机器人建立私聊，从日志中获取 chat_id 后填入此处
  chat_id: ""
  # 每条消息最多显示的活动数量（可选，默认20，范围1-100）
  # 当活动数量超过此限制时，会分多条消息发送，保持序号连续
  # 用于避免飞书消息内容过长导致发送失败
  max_activities_per_card: 20

database:
  # 数据库文件存储目录（相对于项目根目录）
  # 例如 "./data" 表示 {项目根目录}/data
  data_dir: "./data"
  # 保留的历史数据库文件数量，默认10个，范围：1-100
  max_history: 10
  # 用户偏好数据库文件路径（可选，相对于项目根目录）
  # 默认使用 {data_dir}/user_preference.db
  # 可以指定绝对路径或相对于项目根目录的路径
  # 例如 "./custom/preferences.db" 表示 {项目根目录}/custom/preferences.db
  preference_db_path: "./data/user_preference.db"

logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR
  # 默认 INFO，如果需要调试信息，请设置为 DEBUG
  level: "INFO"
  
  # 文件日志配置（可选）
  file:
    # 是否启用文件日志，默认关闭
    enabled: false
    
    # 日志文件路径（相对于项目根目录或绝对路径）
    # 例如 "./logs/nextarc.log" 表示 {项目根目录}/logs/nextarc.log
    path: "./logs/nextarc.log"
    
    # 单个日志文件最大大小（MB），达到后会自动轮转
    # 默认 10MB，范围：1-1000
    max_size_mb: 10
    
    # 保留的历史日志文件数量
    # 默认 5 个，范围：0-100
    # 例如设为 5 时，会保留 nextarc.log.1 到 nextarc.log.5
    backup_count: 5

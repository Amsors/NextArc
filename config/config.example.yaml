# NextArc 配置文件模板
# 复制此文件并填写实际值后使用

ustc:
  # 认证模式: "file" 从本文件读取，"env" 从环境变量读取
  auth_mode: "file"
  
  # auth_mode=file 时使用以下配置
  username: "PB12345678"           # USTC学号，如 "SA22000001"
  password: "12345678"           # 统一身份认证密码
  
  # auth_mode=env 时从以下环境变量名读取
  env_username: "USTC_USERNAME"
  env_password: "USTC_PASSWORD"

filter:
  ignore_participated_but_ended_activity: true

behavior:
  scan_on_start: false
  update_search_result: true

monitor:
  # 定时扫描间隔（分钟），默认15分钟
  interval_minutes: 15
  # 发现新活动时是否发送飞书通知
  notify_new_activities: true
  # 是否使用 AI 筛选新活动（需要配置 ai 部分）
  use_ai_filter: false

# AI 筛选配置（使用 OpenAI API 格式）
# ⚠️ 重要：如果启用 AI 功能（enabled: true），以下所有带 [必填] 标记的配置项都必须填写，
#    否则程序启动时会报错。如果不使用 AI 功能，请保持 enabled: false
ai:
  # 是否启用 AI 筛选
  enabled: false
  
  # API 密钥 [必填]（如果 enabled: true）
  # 例如：sk-xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx
  api_key: ""
  
  # API 基础 URL [可选]
  # 用于第三方兼容服务如 DeepSeek、Moonshot 等
  # 例如：https://api.deepseek.com/v1
  # 留空则使用 OpenAI 官方 API
  base_url: ""
  
  # 模型名称 [必填]（如果 enabled: true）
  # 例如：gpt-3.5-turbo, gpt-4, deepseek-chat
  model: ""
  
  # 用户偏好描述 [必填]（如果 enabled: true）
  # 用于指导 AI 筛选，建议详细描述你的专业、兴趣、想参加的活动类型等
  # 这将直接影响 AI 的筛选效果
  user_info: |
  
  
  # 系统提示词文件路径 [必填]（如果 enabled: true）
  # 相对于项目根目录或绝对路径
  # 该文件必须存在且不能为空，否则启动时报错
  system_prompt_file: "config/prompts/system_prompt.txt"
  
  # 用户提示词模板文件路径 [必填]（如果 enabled: true）
  # 相对于项目根目录或绝对路径
  # 该文件必须存在且不能为空，否则启动时报错
  # 可用变量：{user_info}, {activity_info}
  user_prompt_template_file: "config/prompts/user_prompt_template.txt"
  
  # 采样温度 [必填]（如果 enabled: true）
  # 范围：0.0-2.0，越低结果越确定，越高结果越多样
  # 建议值：0.3（较为确定）到 0.7（较为灵活）
  temperature:
  
  # 请求超时时间（秒）[可选]
  # 默认 30 秒
  timeout: 30

feishu:
  # 飞书应用凭证（在飞书开放平台获取）
  app_id: "cli_xxxxxxxxxxxxxxxx"             # 如 "cli_xxxxxxxxxxxxxxxx"
  app_secret: "qwertyuiop1234567890"         # 应用密钥
  # 私聊会话ID（可选，格式如 oc_xxxxxxxxxxxxxxxx）
  # 配置后机器人启动即可发送消息，无需等待用户先发消息
  # 获取方式：首次运行时与机器人建立私聊，从日志中获取 chat_id 后填入此处
  chat_id: ""

database:
  # 数据库文件存储目录（相对于项目根目录）
  # 例如 "./data" 表示 {项目根目录}/data
  data_dir: "./data"
  # 保留的历史数据库文件数量
  max_history: 10
  # 用户偏好数据库文件路径（可选，相对于项目根目录）
  # 默认使用 {data_dir}/user_preference.db
  # 可以指定绝对路径或相对于项目根目录的路径
  # 例如 "./custom/preferences.db" 表示 {项目根目录}/custom/preferences.db
  preference_db_path: "./data/user_preference.db"

logging:
  # 日志级别: DEBUG, INFO, WARNING, ERROR
  level: "INFO"
